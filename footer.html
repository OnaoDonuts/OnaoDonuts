<script>
    /**
 * Galleryの画像をYouTubeサムネイルに自動置換するスクリプト
 */
document.addEventListener('DOMContentLoaded', async () => {
    try {
        // 1. レシピデータを取得（YouTube IDを知るため）
        const response = await fetch('js/recipes.json');
        const recipes = await response.json();

        // 2. ギャラリー内の各リンクをチェック
        const galleryLinks = document.querySelectorAll('.single-insta-feeds a');
        
        galleryLinks.forEach(link => {
            const url = new URL(link.href, window.location.origin);
            const recipeId = url.searchParams.get('id'); // 'v138'などを取得
            
            // 3. JSONデータからYouTube IDを探す
            const recipe = recipes.find(r => r.id === recipeId);
            
            if (recipe && recipe.youtube) {
                const img = link.querySelector('img');
                if (img) {
                    // 4. 画像をYouTubeのWebP（中画質 mqdefault）に差し替え！
                    // mqdefaultは320x180なので、ギャラリーのような小さい枠に最適です
                    img.src = `https://img.youtube.com/vi/${recipe.youtube}/mqdefault.webp`;
                    
                    // WebPが万が一ない場合のエラーハンドリング
                    img.onerror = function() {
                        this.src = `https://img.youtube.com/vi/${recipe.youtube}/mqdefault.jpg`;
                    };
                }
            }
        });
    } catch (error) {
        console.error("Gallery置換エラー:", error);
    }
});
</script>
